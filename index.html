<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KYPN - Kano Youth Political Network</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .animate-fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .nav-item:hover { background: rgba(22, 163, 74, 0.1); }
        .stat-card { transition: all 0.3s ease; }
        .stat-card:hover { transform: translateY(-5px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2); }
        .bg-primary-green { background-color: #16a34a; }
        .text-primary-green { color: #16a34a; }
        .border-primary-green { border-color: #16a34a; }
        .bg-primary-black { background-color: #1f2937; }
        .text-primary-black { color: #1f2937; }
        .bg-accent-red { background-color: #dc2626; }
        .text-accent-red { color: #dc2626; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #16a34a; border-radius: 3px; }
        .leader-card { transition: all 0.3s ease; }

        .ticker-wrap { overflow: hidden; background: linear-gradient(90deg, #15803d, #166534); border-bottom: 2px solid #14532d; }
        .ticker-track { display: inline-flex; white-space: nowrap; animation: ticker 70s linear infinite; }
        .ticker-track:hover { animation-play-state: paused; }
        @keyframes ticker { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
    </style>
</head>
<body class="bg-gray-50">
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const KANO_DATA = {"Kano Municipal": {"zone": "Kano Central", "wards": {"Dala": ["PU-001 Dala Primary School", "PU-002 Dala Health Centre", "PU-003 Dala Mosque"], "Fagge A": ["PU-001 Fagge Market", "PU-002 Fagge Primary School", "PU-003 Fagge Junction"], "Fagge B": ["PU-001 Fagge B Mosque", "PU-002 Fagge B School"], "Kofar Mata": ["PU-001 Kofar Mata Gate", "PU-002 Kofar Mata School"], "Kurna": ["PU-001 Kurna Primary School", "PU-002 Kurna Mosque"]}}, "Gwale": {"zone": "Kano Central", "wards": {"Gwale Central": ["PU-001 Gwale Town Hall", "PU-002 Gwale Primary School"], "Gwale North": ["PU-001 Gwale North Mosque", "PU-002 Gwale North Market"], "Kofar Wambai": ["PU-001 Kofar Wambai Gate", "PU-002 Kofar Wambai School"], "Soro": ["PU-001 Soro Primary School", "PU-002 Soro Mosque"]}}, "Nassarawa": {"zone": "Kano Central", "wards": {"Brigade": ["PU-001 Brigade School", "PU-002 Brigade Junction"], "Diso": ["PU-001 Diso School", "PU-002 Diso Market"], "Kawaji": ["PU-001 Kawaji Primary School", "PU-002 Kawaji Mosque"], "Nasarawa": ["PU-001 Nassarawa School", "PU-002 Nassarawa Market"]}}, "Tarauni": {"zone": "Kano Central", "wards": {"Tarauni Central": ["PU-001 Tarauni Town Hall", "PU-002 Tarauni Market"], "Tarauni North": ["PU-001 Tarauni North School", "PU-002 Tarauni North Mosque"], "Hotoro": ["PU-001 Hotoro Primary School", "PU-002 Hotoro Market"]}}, "Fagge": {"zone": "Kano Central", "wards": {"Fagge A": ["PU-001 Fagge A School", "PU-002 Fagge A Mosque"], "Fagge B": ["PU-001 Fagge B Market", "PU-002 Fagge B Junction"], "Fagge C": ["PU-001 Fagge C School", "PU-002 Fagge C Mosque"]}}, "Dala": {"zone": "Kano Central", "wards": {"Dala Central": ["PU-001 Dala Central School", "PU-002 Dala Central Mosque"], "Dala North": ["PU-001 Dala North Market", "PU-002 Dala North School"], "Rijiyar Lemo": ["PU-001 Rijiyar Lemo School", "PU-002 Rijiyar Lemo Mosque"]}}, "Kumbotso": {"zone": "Kano Central", "wards": {"Kumbotso": ["PU-001 Kumbotso Primary School", "PU-002 Kumbotso Market"], "Gobirawa": ["PU-001 Gobirawa School", "PU-002 Gobirawa Mosque"], "Unguwar Uku": ["PU-001 Unguwar Uku School", "PU-002 Unguwar Uku Market"]}}, "Ungogo": {"zone": "Kano Central", "wards": {"Ungogo": ["PU-001 Ungogo Primary School", "PU-002 Ungogo Market"], "Kwanar Chadi": ["PU-001 Kwanar Chadi School", "PU-002 Kwanar Chadi Mosque"], "Unguwar Jedo": ["PU-001 Unguwar Jedo School", "PU-002 Unguwar Jedo Market"]}}, "Dawakin Tofa": {"zone": "Kano North", "wards": {"Dawakin Tofa": ["PU-001 Dawakin Tofa School", "PU-002 Dawakin Tofa Market"], "Kauyen Mata": ["PU-001 Kauyen Mata School", "PU-002 Kauyen Mata Mosque"], "Tofa": ["PU-001 Tofa Primary School", "PU-002 Tofa Market"]}}, "Bichi": {"zone": "Kano North", "wards": {"Bichi": ["PU-001 Bichi Town Hall", "PU-002 Bichi Market", "PU-003 Bichi School"], "Bichi North": ["PU-001 Bichi North School", "PU-002 Bichi North Mosque"], "Wawarsa": ["PU-001 Wawarsa School", "PU-002 Wawarsa Market"]}}, "Shanono": {"zone": "Kano North", "wards": {"Shanono": ["PU-001 Shanono Primary School", "PU-002 Shanono Market"], "Badume": ["PU-001 Badume School", "PU-002 Badume Mosque"]}}, "Bagwai": {"zone": "Kano North", "wards": {"Bagwai": ["PU-001 Bagwai Primary School", "PU-002 Bagwai Market"], "Marmara": ["PU-001 Marmara School", "PU-002 Marmara Mosque"]}}, "Minjibir": {"zone": "Kano North", "wards": {"Minjibir": ["PU-001 Minjibir Primary School", "PU-002 Minjibir Market"], "Kausani": ["PU-001 Kausani School", "PU-002 Kausani Mosque"]}}, "Makoda": {"zone": "Kano North", "wards": {"Makoda": ["PU-001 Makoda Primary School", "PU-002 Makoda Market"], "Daddarawa": ["PU-001 Daddara School", "PU-002 Daddara Mosque"]}}, "Kunchi": {"zone": "Kano North", "wards": {"Kunchi": ["PU-001 Kunchi Primary School", "PU-002 Kunchi Market"], "Mazoji": ["PU-001 Mazoji School", "PU-002 Mazoji Mosque"]}}, "Gezawa": {"zone": "Kano East", "wards": {"Gezawa": ["PU-001 Gezawa Primary School", "PU-002 Gezawa Market"], "Garun Babba": ["PU-001 Garun Babba School", "PU-002 Garun Babba Mosque"]}}, "Dawakin Kudu": {"zone": "Kano East", "wards": {"Dawakin Kudu": ["PU-001 Dawakin Kudu School", "PU-002 Dawakin Kudu Market"], "Kofar Ruwa": ["PU-001 Kofar Ruwa School", "PU-002 Kofar Ruwa Mosque"]}}, "Wudil": {"zone": "Kano East", "wards": {"Wudil": ["PU-001 Wudil Primary School", "PU-002 Wudil Market"], "Garko": ["PU-001 Garko School", "PU-002 Garko Mosque"], "Kiyawa": ["PU-001 Kiyawa School", "PU-002 Kiyawa Market"]}}, "Garko": {"zone": "Kano East", "wards": {"Garko": ["PU-001 Garko Primary School", "PU-002 Garko Market"], "Gayawa": ["PU-001 Gayawa School", "PU-002 Gayawa Mosque"]}}, "Garun Malam": {"zone": "Kano East", "wards": {"Garun Malam": ["PU-001 Garun Malam School", "PU-002 Garun Malam Market"], "Fagwalwa": ["PU-001 Fagwalwa School", "PU-002 Fagwalwa Mosque"]}}, "Warawa": {"zone": "Kano East", "wards": {"Warawa": ["PU-001 Warawa Primary School", "PU-002 Warawa Market"], "Unguwar Doya": ["PU-001 Unguwar Doya School", "PU-002 Unguwar Doya Mosque"]}}, "Sumaila": {"zone": "Kano South", "wards": {"Sumaila": ["PU-001 Sumaila Primary School", "PU-002 Sumaila Market"], "Unguwar Rimi": ["PU-001 Unguwar Rimi School", "PU-002 Unguwar Rimi Mosque"]}}, "Kibiya": {"zone": "Kano South", "wards": {"Kibiya": ["PU-001 Kibiya Primary School", "PU-002 Kibiya Market"], "Dawo": ["PU-001 Dawo School", "PU-002 Dawo Mosque"]}}, "Bebeji": {"zone": "Kano South", "wards": {"Bebeji": ["PU-001 Bebeji Primary School", "PU-002 Bebeji Market"], "Kiru": ["PU-001 Kiru School", "PU-002 Kiru Mosque"]}}, "Kiru": {"zone": "Kano South", "wards": {"Kiru": ["PU-001 Kiru Primary School", "PU-002 Kiru Market"], "Gyallesu": ["PU-001 Gyallesu School", "PU-002 Gyallesu Mosque"]}}, "Doguwa": {"zone": "Kano South", "wards": {"Doguwa": ["PU-001 Doguwa Primary School", "PU-002 Doguwa Market"], "Rangi": ["PU-001 Rangi School", "PU-002 Rangi Mosque"]}}, "Tudun Wada": {"zone": "Kano South", "wards": {"Tudun Wada": ["PU-001 Tudun Wada Primary School", "PU-002 Tudun Wada Market"], "Dan Alhaji": ["PU-001 Dan Alhaji School", "PU-002 Dan Alhaji Mosque"]}}, "Rogo": {"zone": "Kano South", "wards": {"Rogo": ["PU-001 Rogo Primary School", "PU-002 Rogo Market"], "Gaya": ["PU-001 Gaya School", "PU-002 Gaya Mosque"]}}, "Rano": {"zone": "Kano South", "wards": {"Rano": ["PU-001 Rano Primary School", "PU-002 Rano Market"], "Tsangaya": ["PU-001 Tsangaya School", "PU-002 Tsangaya Mosque"]}}, "Takai": {"zone": "Kano South", "wards": {"Takai": ["PU-001 Takai Primary School", "PU-002 Takai Market"], "Durun Nai": ["PU-001 Durun Nai School", "PU-002 Durun Nai Mosque"]}}, "Bunkure": {"zone": "Kano South", "wards": {"Bunkure": ["PU-001 Bunkure Primary School", "PU-002 Bunkure Market"], "Karaye": ["PU-001 Karaye School", "PU-002 Karaye Mosque"]}}, "Karaye": {"zone": "Kano West", "wards": {"Karaye": ["PU-001 Karaye Primary School", "PU-002 Karaye Market"], "Gafasa": ["PU-001 Gafasa School", "PU-002 Gafasa Mosque"]}}, "Gwarzo": {"zone": "Kano West", "wards": {"Gwarzo": ["PU-001 Gwarzo Primary School", "PU-002 Gwarzo Market"], "Kogo": ["PU-001 Kogo School", "PU-002 Kogo Mosque"]}}, "Kabo": {"zone": "Kano West", "wards": {"Kabo": ["PU-001 Kabo Primary School", "PU-002 Kabo Market"], "Marawa": ["PU-001 Marawa School", "PU-002 Marawa Mosque"]}}, "Ajingi": {"zone": "Kano West", "wards": {"Ajingi": ["PU-001 Ajingi Primary School", "PU-002 Ajingi Market"], "Garawa": ["PU-001 Garawa School", "PU-002 Garawa Mosque"]}}, "Albasu": {"zone": "Kano West", "wards": {"Albasu": ["PU-001 Albasu Primary School", "PU-002 Albasu Market"], "Fagam": ["PU-001 Fagam School", "PU-002 Fagam Mosque"]}}, "Madobi": {"zone": "Kano West", "wards": {"Madobi": ["PU-001 Madobi Primary School", "PU-002 Madobi Market"], "Kusa": ["PU-001 Kusa School", "PU-002 Kusa Mosque"]}}, "Kura": {"zone": "Kano West", "wards": {"Kura": ["PU-001 Kura Primary School", "PU-002 Kura Market"], "Dan Yusufa": ["PU-001 Dan Yusufa School", "PU-002 Dan Yusufa Mosque"]}}, "Rimin Gado": {"zone": "Kano North", "wards": {"Rimin Gado": ["PU-001 Rimin Gado School", "PU-002 Rimin Gado Market"], "Kaukaci": ["PU-001 Kaukaci School", "PU-002 Kaukaci Mosque"]}}};

// Get all zones
const getZones = () => {
    const zones = new Set();
    Object.values(KANO_DATA).forEach(v => zones.add(v.zone));
    return Array.from(zones).sort();
};

// Get LGAs by zone
const getLGAsByZone = (zone) => {
    return Object.keys(KANO_DATA).filter(lga => KANO_DATA[lga].zone === zone).sort();
};

// Get all LGAs
const getAllLGAs = () => Object.keys(KANO_DATA).sort();

// Get wards by LGA
const getWardsByLGA = (lga) => {
    if (!lga || !KANO_DATA[lga]) return [];
    return Object.keys(KANO_DATA[lga].wards).sort();
};

// Get polling units by LGA and ward
const getPUsByWard = (lga, ward) => {
    if (!lga || !ward || !KANO_DATA[lga] || !KANO_DATA[lga].wards[ward]) return [];
    return KANO_DATA[lga].wards[ward];
};

const today = new Date().toISOString().split('T')[0];

function App() {
    const [currentView, setCurrentView] = useState('login');
    const [userRole, setUserRole] = useState(null);
    const [sidebarOpen, setSidebarOpen] = useState(true);
    const [showNotification, setShowNotification] = useState(false);
    const [notificationMessage, setNotificationMessage] = useState('');
    const [notificationType, setNotificationType] = useState('success');
    const [showModal, setShowModal] = useState(false);
    const [modalType, setModalType] = useState('');


    const [voters, setVoters] = useState([
        { id: 1, full_name: 'Abubakar Ibrahim', organization: 'Farmers Association', zone: 'Kano Central', local_government: 'Kano Municipal', ward: 'Fagge A', polling_unit: 'PU-001 Fagge Market', phone_number: '08012345678', vin: '90F5B6C3D4E8A1B7', registered_at: '2026-03-09', registered_by: 'Admin' },
        { id: 2, full_name: 'Fatima Mohammed', organization: null, zone: 'Kano Central', local_government: 'Gwale', ward: 'Gwale Central', polling_unit: 'PU-001 Gwale Town Hall', phone_number: '08098765432', vin: '1A2B3C4D5E6F7G8H', registered_at: '2026-03-09', registered_by: 'Admin' },
        { id: 3, full_name: 'Musa Sani', organization: 'Teachers Union', zone: 'Kano Central', local_government: 'Nassarawa', ward: 'Brigade', polling_unit: 'PU-001 Brigade School', phone_number: '08011112222', vin: '9Z8Y7X6W5V4U3T2S', registered_at: '2026-03-08', registered_by: 'user1' },
        { id: 4, full_name: 'Hauwa Abdullahi', organization: 'Traders Association', zone: 'Kano East', local_government: 'Garko', ward: 'Garko', polling_unit: 'PU-001 Garko Primary School', phone_number: '08033334444', vin: '4H5J6K7L8M9N0P1Q', registered_at: '2026-03-07', registered_by: 'user1' },
        { id: 5, full_name: 'Ibrahim Yusuf', organization: null, zone: 'Kano Central', local_government: 'Tarauni', ward: 'Tarauni Central', polling_unit: 'PU-001 Tarauni Town Hall', phone_number: '08055556666', vin: '2R3S4T5U6V7W8X9Y', registered_at: '2026-03-09', registered_by: 'self' },
    ]);

    const [users, setUsers] = useState([
        { id: 1, username: 'admin', password: 'admin123', role: 'Admin', created_at: '2026-01-15', status: 'Active' },
        { id: 2, username: 'user1', password: 'user123', role: 'User', created_at: '2026-01-20', status: 'Active' },
    ]);

    const showNotif = (message, type = 'success') => {
        setNotificationMessage(message);
        setNotificationType(type);
        setShowNotification(true);
        setTimeout(() => setShowNotification(false), 3500);
    };

    const handleLogin = (username, password) => {
        const found = users.find(u => u.username === username && u.password === password && u.role === 'Admin');
        if (found) {
            setUserRole('Admin');
            setCurrentView('dashboard');
            showNotif('Welcome Admin! Login successful.');
        } else {
            showNotif('Invalid admin credentials!', 'error');
        }
    };

    // Notification
    const Notification = () => {
        if (!showNotification) return null;
        return (
            <div className="fixed top-4 right-4 z-50 animate-fade-in">
                <div className={`px-6 py-4 rounded-xl shadow-2xl flex items-center gap-3 ${notificationType === 'success' ? 'bg-primary-green' : 'bg-accent-red'} text-white`}>
                    <span className="text-xl">{notificationType === 'success' ? '✓' : '✗'}</span>
                    <p className="font-bold">{notificationMessage}</p>
                </div>
            </div>
        );
    };

    // Self-Registration View (public)
    const SelfRegisterView = () => {
        const [formData, setFormData] = useState({ full_name:'', organization:'', zone:'', local_government:'', ward:'', polling_unit:'', phone_number:'', vin:'' });
        const [availableLGAs, setAvailableLGAs] = useState([]);
        const [availableWards, setAvailableWards] = useState([]);
        const [availablePUs, setAvailablePUs] = useState([]);
        const [step, setStep] = useState(1);

        const handleChange = (field, value) => {
            setFormData(prev => {
                const updated = {...prev, [field]: value};
                if (field === 'zone') {
                    updated.local_government = '';
                    updated.ward = '';
                    updated.polling_unit = '';
                    setAvailableLGAs(getLGAsByZone(value));
                    setAvailableWards([]);
                    setAvailablePUs([]);
                }
                if (field === 'local_government') {
                    updated.ward = '';
                    updated.polling_unit = '';
                    setAvailableWards(getWardsByLGA(value));
                    setAvailablePUs([]);
                }
                if (field === 'ward') {
                    updated.polling_unit = '';
                    setAvailablePUs(getPUsByWard(updated.local_government, value));
                }
                return updated;
            });
        };

        const handleSubmit = (e) => {
            e.preventDefault();
            const newVoter = {
                id: Date.now(),
                ...formData,
                registered_at: today,
                registered_by: 'self'
            };
            setVoters(prev => [...prev, newVoter]);
            showNotif('You have been registered successfully! Welcome to KYPN.');
            setFormData({ full_name:'', organization:'', zone:'', local_government:'', ward:'', polling_unit:'', phone_number:'', vin:'' });
            setStep(1);
        };

        return (
            <div className="min-h-screen bg-gradient-to-br from-green-900 via-green-800 to-green-700">
                {/* Header */}
                <div className="bg-white shadow-lg px-6 py-4">
                    <div className="max-w-4xl mx-auto flex items-center justify-between">
                        <div className="flex items-center gap-4">
                            <img src="./assets/images/kypnlogo.jpeg" alt="KYPN Logo" className="w-16 h-16 object-contain rounded-full border-2 border-green-600"/>
                            <div>
                                <h1 className="text-xl font-black text-green-700">KANO YOUTH POLITICAL NETWORK</h1>
                                <p className="text-xs text-red-600 font-bold">Kano First in Youth Empowerment</p>
                            </div>
                        </div>
                        <button onClick={() => { setCurrentView('login'); setUserRole(null); }} className="text-sm bg-gray-100 px-4 py-2 rounded-lg hover:bg-gray-200 font-semibold">← Back</button>
                    </div>
                </div>

                <div className="max-w-2xl mx-auto py-10 px-4">
                    <div className="bg-white rounded-2xl shadow-2xl overflow-hidden">
                        <div className="bg-primary-green text-white p-6 text-center">
                            <h2 className="text-3xl font-black">MEMBER REGISTRATION</h2>
                            <p className="text-green-100 mt-1">Join the Kano Youth Political Network</p>
                            <div className="flex justify-center gap-2 mt-4">
                                {[1,2].map(s => (
                                    <div key={s} className={`w-8 h-8 rounded-full flex items-center justify-center font-bold text-sm ${step >= s ? 'bg-white text-green-700' : 'bg-green-600 text-white'}`}>{s}</div>
                                ))}
                            </div>
                        </div>
                        <div className="p-8">
                            <form onSubmit={handleSubmit}>
                                {step === 1 && (
                                    <div className="space-y-5">
                                        <h3 className="text-xl font-bold text-gray-800 mb-4">Personal Information</h3>
                                        <div>
                                            <label className="block font-semibold text-gray-700 mb-1">Full Name *</label>
                                            <input required value={formData.full_name} onChange={e => handleChange('full_name', e.target.value)} className="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:border-green-500 focus:outline-none" placeholder="Enter your full name"/>
                                        </div>
                                        <div>
                                            <label className="block font-semibold text-gray-700 mb-1">Organization (Optional)</label>
                                            <input value={formData.organization} onChange={e => handleChange('organization', e.target.value)} className="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:border-green-500 focus:outline-none" placeholder="Your organization if any"/>
                                        </div>
                                        <div>
                                            <label className="block font-semibold text-gray-700 mb-1">Phone Number *</label>
                                            <input required value={formData.phone_number} onChange={e => handleChange('phone_number', e.target.value)} className="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:border-green-500 focus:outline-none" placeholder="080XXXXXXXX"/>
                                        </div>
                                        <div>
                                            <label className="block font-semibold text-gray-700 mb-1">Voter Identification Number (VIN) *</label>
                                            <input required value={formData.vin} onChange={e => handleChange('vin', e.target.value)} className="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:border-green-500 focus:outline-none" placeholder="Enter your VIN from voter card"/>
                                        </div>
                                        <button type="button" onClick={() => { if(formData.full_name && formData.phone_number && formData.vin) setStep(2); else showNotif('Please fill all required fields', 'error'); }} className="w-full bg-primary-green text-white py-3 rounded-lg font-bold text-lg hover:bg-green-700 transition">
                                            Next Step →
                                        </button>
                                    </div>
                                )}
                                {step === 2 && (
                                    <div className="space-y-5">
                                        <h3 className="text-xl font-bold text-gray-800 mb-4">Location Information</h3>
                                        <div>
                                            <label className="block font-semibold text-gray-700 mb-1">Zone *</label>
                                            <select required value={formData.zone} onChange={e => handleChange('zone', e.target.value)} className="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:border-green-500 focus:outline-none bg-white">
                                                <option value="">-- Select Zone --</option>
                                                {getZones().map(z => <option key={z} value={z}>{z}</option>)}
                                            </select>
                                        </div>
                                        <div>
                                            <label className="block font-semibold text-gray-700 mb-1">Local Government *</label>
                                            <select required value={formData.local_government} onChange={e => handleChange('local_government', e.target.value)} disabled={!formData.zone} className="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:border-green-500 focus:outline-none bg-white disabled:opacity-50">
                                                <option value="">-- Select LGA --</option>
                                                {availableLGAs.map(l => <option key={l} value={l}>{l}</option>)}
                                            </select>
                                        </div>
                                        <div>
                                            <label className="block font-semibold text-gray-700 mb-1">Ward *</label>
                                            <select required value={formData.ward} onChange={e => handleChange('ward', e.target.value)} disabled={!formData.local_government} className="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:border-green-500 focus:outline-none bg-white disabled:opacity-50">
                                                <option value="">-- Select Ward --</option>
                                                {availableWards.map(w => <option key={w} value={w}>{w}</option>)}
                                            </select>
                                        </div>
                                        <div>
                                            <label className="block font-semibold text-gray-700 mb-1">Polling Unit *</label>
                                            <select required value={formData.polling_unit} onChange={e => handleChange('polling_unit', e.target.value)} disabled={!formData.ward} className="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:border-green-500 focus:outline-none bg-white disabled:opacity-50">
                                                <option value="">-- Select Polling Unit --</option>
                                                {availablePUs.map(p => <option key={p} value={p}>{p}</option>)}
                                            </select>
                                        </div>
                                        <div className="flex gap-3">
                                            <button type="button" onClick={() => setStep(1)} className="flex-1 border-2 border-gray-300 py-3 rounded-lg font-bold hover:bg-gray-50 transition">← Back</button>
                                            <button type="submit" className="flex-1 bg-primary-green text-white py-3 rounded-lg font-bold text-lg hover:bg-green-700 transition">✓ Register</button>
                                        </div>
                                    </div>
                                )}
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        );
    };

    // Separate AdminLoginForm component to avoid re-renders on parent state change
    const AdminLoginForm = ({ onLogin }) => {
        const [username, setUsername] = useState('');
        const [password, setPassword] = useState('');
        const handleSubmit = (e) => {
            e.preventDefault();
            onLogin(username, password);

    const VotersView = () => {

        const [availableLGAs, setAvailableLGAs] = useState([]);
        const [availableWards, setAvailableWards] = useState([]);
        const [availablePUs, setAvailablePUs] = useState([]);

        const handleFormChange = (field, value) => {
            setFormData(prev => {
                const updated = {...prev, [field]: value};
                if (field === 'zone') {
                    updated.local_government = ''; updated.ward = ''; updated.polling_unit = '';
                    setAvailableLGAs(getLGAsByZone(value));
                    setAvailableWards([]); setAvailablePUs([]);
                }
                if (field === 'local_government') {
                    updated.ward = ''; updated.polling_unit = '';
                    setAvailableWards(getWardsByLGA(value)); setAvailablePUs([]);
                }
                if (field === 'ward') {
                    updated.polling_unit = '';
                    setAvailablePUs(getPUsByWard(updated.local_government, value));
                }
                return updated;
            });
        };

        const handleAddVoter = (e) => {
            e.preventDefault();
            const newVoter = { id: Date.now(), ...formData, registered_at: today, registered_by: 'Admin' };
            setVoters(prev => [...prev, newVoter]);
            setShowAddModal(false);
            setFormData({ full_name:'', organization:'', zone:'', local_government:'', ward:'', polling_unit:'', phone_number:'', vin:'' });

            if (filterZone && v.zone !== filterZone) return false;

            if (filterPU && v.polling_unit !== filterPU) return false;
            if (filterDate && v.registered_at !== filterDate) return false;

                return v.full_name.toLowerCase().includes(q) || v.vin.toLowerCase().includes(q) || v.phone_number.includes(q);
            }
            return true;
        });

        if (sortBy === 'name') displayed = [...displayed].sort((a,b) => a.full_name.localeCompare(b.full_name));

                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-6 gap-3">
                        <input value={searchQuery} onChange={e => setSearchQuery(e.target.value)} placeholder="Search name/VIN/phone..." className="col-span-1 md:col-span-3 lg:col-span-2 px-3 py-2 border-2 border-gray-200 rounded-lg text-sm focus:border-green-500 focus:outline-none"/>
                        <select value={filterZone} onChange={e => { setFilterZone(e.target.value); setFilterLGA(''); setFilterWard(''); setFilterPU(''); }} className="px-3 py-2 border-2 border-gray-200 rounded-lg text-sm focus:border-green-500 focus:outline-none bg-white">
                            <option value="">All Zones</option>
                            {getZones().map(z => <option key={z} value={z}>{z}</option>)}
                        </select>
                        <select value={filterLGA} onChange={e => { setFilterLGA(e.target.value); setFilterWard(''); setFilterPU(''); }} className="px-3 py-2 border-2 border-gray-200 rounded-lg text-sm focus:border-green-500 focus:outline-none bg-white">
                            <option value="">All LGAs</option>
                            {filteredLGAs.map(l => <option key={l} value={l}>{l}</option>)}
                        </select>
                        <select value={filterWard} onChange={e => { setFilterWard(e.target.value); setFilterPU(''); }} disabled={!filterLGA} className="px-3 py-2 border-2 border-gray-200 rounded-lg text-sm focus:border-green-500 focus:outline-none bg-white disabled:opacity-50">
                            <option value="">All Wards</option>
                            {filteredWards.map(w => <option key={w} value={w}>{w}</option>)}
                        </select>
                        <select value={filterPU} onChange={e => setFilterPU(e.target.value)} disabled={!filterWard} className="px-3 py-2 border-2 border-gray-200 rounded-lg text-sm focus:border-green-500 focus:outline-none bg-white disabled:opacity-50">
                            <option value="">All Polling Units</option>
                            {filteredPUs.map(p => <option key={p} value={p}>{p}</option>)}
                        </select>
                    </div>
                    <div className="flex gap-3 mt-3 flex-wrap">
                        <input type="date" value={filterDate} onChange={e => setFilterDate(e.target.value)} className="px-3 py-2 border-2 border-gray-200 rounded-lg text-sm focus:border-green-500 focus:outline-none"/>
                        <select value={sortBy} onChange={e => setSortBy(e.target.value)} className="px-3 py-2 border-2 border-gray-200 rounded-lg text-sm focus:border-green-500 focus:outline-none bg-white">
                            <option value="name">Sort by Name</option>
                            <option value="date">Sort by Date</option>
                            <option value="lga">Sort by LGA</option>
                        </select>
                        <button onClick={() => { setFilterZone(''); setFilterLGA(''); setFilterWard(''); setFilterPU(''); setFilterDate(''); setSearchQuery(''); }} className="px-4 py-2 bg-gray-100 text-gray-700 rounded-lg text-sm font-semibold hover:bg-gray-200">Clear Filters</button>
                        <button onClick={() => { setFilterDate(today); }} className="px-4 py-2 bg-blue-100 text-blue-700 rounded-lg text-sm font-semibold hover:bg-blue-200">Today Only</button>
                    </div>
                </div>

                {/* Table */}
                <div className="bg-white rounded-xl shadow-lg overflow-hidden">
                    <div className="overflow-x-auto">
                        <table className="w-full text-sm">
                            <thead className="bg-green-700 text-white">
                                <tr>
                                    <th className="px-4 py-3 text-left">#</th>
                                    <th className="px-4 py-3 text-left">Full Name</th>
                                    <th className="px-4 py-3 text-left">Zone</th>
                                    <th className="px-4 py-3 text-left">LGA</th>
                                    <th className="px-4 py-3 text-left">Ward</th>
                                    <th className="px-4 py-3 text-left">Polling Unit</th>
                                    <th className="px-4 py-3 text-left">Phone</th>
                                    <th className="px-4 py-3 text-left">VIN</th>
                                    <th className="px-4 py-3 text-left">Date</th>
                                    <th className="px-4 py-3 text-left">Actions</th>
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-gray-100">
                                {displayed.length === 0 ? (
                                    <tr><td colSpan="10" className="px-4 py-8 text-center text-gray-400 font-semibold">No records found</td></tr>
                                ) : displayed.map((voter, idx) => (
                                    <tr key={voter.id} className="hover:bg-green-50 transition">
                                        <td className="px-4 py-3 font-bold text-gray-500">{idx+1}</td>
                                        <td className="px-4 py-3">
                                            <div>
                                                <p className="font-bold text-gray-800">{voter.full_name}</p>
                                                {voter.organization && <p className="text-xs text-gray-400">{voter.organization}</p>}
                                            </div>
                                        </td>
                                        <td className="px-4 py-3"><span className="bg-blue-100 text-blue-700 text-xs font-bold px-2 py-1 rounded-full">{voter.zone}</span></td>
                                        <td className="px-4 py-3 font-semibold text-gray-700">{voter.local_government}</td>
                                        <td className="px-4 py-3 text-gray-600">{voter.ward}</td>
                                        <td className="px-4 py-3 text-xs text-gray-500">{voter.polling_unit}</td>
                                        <td className="px-4 py-3 text-gray-600">{voter.phone_number}</td>
                                        <td className="px-4 py-3"><span className="bg-gray-100 text-gray-700 text-xs font-mono px-2 py-1 rounded">{voter.vin}</span></td>
                                        <td className="px-4 py-3">
                                            <span className={`text-xs font-bold px-2 py-1 rounded-full ${voter.registered_at === today ? 'bg-green-100 text-green-700' : 'bg-gray-100 text-gray-600'}`}>
                                                {voter.registered_at}
                                            </span>
                                        </td>
                                        <td className="px-4 py-3">
                                            <button onClick={() => { setVoters(prev => prev.filter(v => v.id !== voter.id)); showNotif('Voter removed'); }} className="p-1.5 bg-red-100 text-red-600 rounded hover:bg-red-200">🗑</button>
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                    <div className="px-5 py-3 bg-green-50 border-t border-green-100 flex items-center justify-between">
                        <p className="text-sm font-bold text-gray-700">Showing {displayed.length} of {voters.length} members</p>
                        <p className="text-xs text-gray-500">Today: <strong className="text-green-600">{todayCount}</strong> new registrations</p>
                    </div>
                </div>

                {/* Add Modal */}
                {showAddModal && (
                    <div className="fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center p-4 z-50 animate-fade-in">
                        <div className="bg-white rounded-2xl shadow-2xl max-w-2xl w-full max-h-[90vh] overflow-y-auto">
                            <div className="bg-green-700 text-white px-6 py-4 flex justify-between items-center sticky top-0">
                                <h3 className="text-xl font-black">Register New Member</h3>
                                <button onClick={() => setShowAddModal(false)} className="text-white hover:text-gray-200 text-2xl">×</button>
                            </div>
                            <form onSubmit={handleAddVoter} className="p-6 space-y-4">
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    <div>
                                        <label className="block font-semibold text-gray-700 mb-1 text-sm">Full Name *</label>
                                        <input required value={formData.full_name} onChange={e => handleFormChange('full_name', e.target.value)} className="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:border-green-500 focus:outline-none" placeholder="Full name"/>
                                    </div>
                                    <div>
                                        <label className="block font-semibold text-gray-700 mb-1 text-sm">Organization</label>
                                        <input value={formData.organization} onChange={e => handleFormChange('organization', e.target.value)} className="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:border-green-500 focus:outline-none" placeholder="Optional"/>
                                    </div>
                                    <div>
                                        <label className="block font-semibold text-gray-700 mb-1 text-sm">Phone *</label>
                                        <input required value={formData.phone_number} onChange={e => handleFormChange('phone_number', e.target.value)} className="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:border-green-500 focus:outline-none" placeholder="080XXXXXXXX"/>
                                    </div>
                                    <div>
                                        <label className="block font-semibold text-gray-700 mb-1 text-sm">VIN *</label>
                                        <input required value={formData.vin} onChange={e => handleFormChange('vin', e.target.value)} className="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:border-green-500 focus:outline-none" placeholder="Voter ID Number"/>
                                    </div>
                                    <div>
                                        <label className="block font-semibold text-gray-700 mb-1 text-sm">Zone *</label>
                                        <select required value={formData.zone} onChange={e => handleFormChange('zone', e.target.value)} className="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:border-green-500 focus:outline-none bg-white">
                                            <option value="">-- Select Zone --</option>
                                            {getZones().map(z => <option key={z} value={z}>{z}</option>)}
                                        </select>
                                    </div>
                                    <div>
                                        <label className="block font-semibold text-gray-700 mb-1 text-sm">Local Government *</label>
                                        <select required value={formData.local_government} onChange={e => handleFormChange('local_government', e.target.value)} disabled={!formData.zone} className="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:border-green-500 focus:outline-none bg-white disabled:opacity-50">
                                            <option value="">-- Select LGA --</option>
                                            {availableLGAs.map(l => <option key={l} value={l}>{l}</option>)}
                                        </select>
                                    </div>
                                    <div>
                                        <label className="block font-semibold text-gray-700 mb-1 text-sm">Ward *</label>
                                        <select required value={formData.ward} onChange={e => handleFormChange('ward', e.target.value)} disabled={!formData.local_government} className="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:border-green-500 focus:outline-none bg-white disabled:opacity-50">
                                            <option value="">-- Select Ward --</option>
                                            {availableWards.map(w => <option key={w} value={w}>{w}</option>)}
                                        </select>
                                    </div>
                                    <div>
                                        <label className="block font-semibold text-gray-700 mb-1 text-sm">Polling Unit *</label>
                                        <select required value={formData.polling_unit} onChange={e => handleFormChange('polling_unit', e.target.value)} disabled={!formData.ward} className="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:border-green-500 focus:outline-none bg-white disabled:opacity-50">
                                            <option value="">-- Select Polling Unit --</option>
                                            {availablePUs.map(p => <option key={p} value={p}>{p}</option>)}
                                        </select>
                                    </div>
                                </div>
                                <div className="flex gap-3 pt-4">
                                    <button type="button" onClick={() => setShowAddModal(false)} className="flex-1 border-2 border-gray-300 py-3 rounded-lg font-bold hover:bg-gray-50">Cancel</button>
                                    <button type="submit" className="flex-1 bg-green-600 text-white py-3 rounded-lg font-bold hover:bg-green-700">✓ Register Member</button>
                                </div>
                            </form>
                        </div>
                    </div>
                )}
            </div>
        );
    };

    // Users Management View
    const UsersView = () => {
        const [showAddUser, setShowAddUser] = useState(false);
        const [newUser, setNewUser] = useState({ username:'', password:'', role:'User' });

        const handleAddUser = (e) => {
            e.preventDefault();
            setUsers(prev => [...prev, { id: Date.now(), ...newUser, created_at: today, status: 'Active' }]);
            setShowAddUser(false);
            setNewUser({ username:'', password:'', role:'User' });
            showNotif('User created successfully!');
        };

        return (
            <div className="animate-fade-in space-y-5">
                <div className="flex justify-between items-center">
                    <h2 className="text-2xl font-black text-gray-800">User Management</h2>
                    <button onClick={() => setShowAddUser(true)} className="bg-green-600 text-white px-4 py-2 rounded-lg font-bold hover:bg-green-700">+ Create User</button>
                </div>
                <div className="bg-white rounded-xl shadow-lg overflow-hidden">
                    <table className="w-full">
                        <thead className="bg-green-700 text-white">
                            <tr>
                                <th className="px-5 py-3 text-left">Username</th>
                                <th className="px-5 py-3 text-left">Role</th>
                                <th className="px-5 py-3 text-left">Created</th>
                                <th className="px-5 py-3 text-left">Status</th>
                                <th className="px-5 py-3 text-left">Actions</th>
                            </tr>
                        </thead>
                        <tbody className="divide-y divide-gray-100">
                            {users.map(user => (
                                <tr key={user.id} className="hover:bg-green-50">
                                    <td className="px-5 py-4">
                                        <div className="flex items-center gap-3">
                                            <div className="w-9 h-9 bg-green-600 rounded-full flex items-center justify-center text-white font-bold">{user.username[0].toUpperCase()}</div>
                                            <span className="font-bold">{user.username}</span>
                                        </div>
                                    </td>
                                    <td className="px-5 py-4"><span className={`px-3 py-1 rounded-full text-xs font-bold ${user.role === 'Admin' ? 'bg-red-100 text-red-700' : 'bg-green-100 text-green-700'}`}>{user.role}</span></td>
                                    <td className="px-5 py-4 text-sm text-gray-600">{user.created_at}</td>
                                    <td className="px-5 py-4"><span className="bg-green-100 text-green-700 text-xs font-bold px-2 py-1 rounded-full">Active</span></td>
                                    <td className="px-5 py-4">
                                        <button onClick={() => { setUsers(prev => prev.filter(u => u.id !== user.id)); showNotif('User deleted'); }} className="p-2 bg-red-100 text-red-600 rounded hover:bg-red-200">🗑</button>
                                    </td>
                                </tr>
                            ))}
                        </tbody>
                    </table>
                </div>
                {showAddUser && (
                    <div className="fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center p-4 z-50">
                        <div className="bg-white rounded-2xl shadow-2xl max-w-md w-full">
                            <div className="bg-green-700 text-white px-6 py-4 flex justify-between">
                                <h3 className="text-xl font-black">Create New User</h3>
                                <button onClick={() => setShowAddUser(false)} className="text-2xl">×</button>
                            </div>
                            <form onSubmit={handleAddUser} className="p-6 space-y-4">
                                <div>
                                    <label className="block font-semibold text-gray-700 mb-1">Username *</label>
                                    <input required value={newUser.username} onChange={e => setNewUser(p => ({...p, username: e.target.value}))} className="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:border-green-500 focus:outline-none" placeholder="Username"/>
                                </div>
                                <div>
                                    <label className="block font-semibold text-gray-700 mb-1">Password *</label>
                                    <input type="password" required value={newUser.password} onChange={e => setNewUser(p => ({...p, password: e.target.value}))} className="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:border-green-500 focus:outline-none" placeholder="Password"/>
                                </div>
                                <div>
                                    <label className="block font-semibold text-gray-700 mb-1">Role *</label>
                                    <select value={newUser.role} onChange={e => setNewUser(p => ({...p, role: e.target.value}))} className="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:border-green-500 focus:outline-none bg-white">
                                        <option value="Admin">Admin</option>
                                        <option value="User">User</option>
                                    </select>
                                </div>
                                <div className="flex gap-3 pt-2">
                                    <button type="button" onClick={() => setShowAddUser(false)} className="flex-1 border-2 border-gray-300 py-3 rounded-lg font-bold">Cancel</button>
                                    <button type="submit" className="flex-1 bg-green-600 text-white py-3 rounded-lg font-bold">Create</button>
                                </div>
                            </form>
                        </div>
                    </div>
                )}
            </div>
        );
    };

    // Sidebar
    const Sidebar = () => (
        <div className={`fixed lg:static inset-y-0 left-0 w-64 bg-white border-r-2 border-green-100 transform transition-transform duration-300 ease-in-out z-40 shadow-xl ${sidebarOpen ? 'translate-x-0' : '-translate-x-full lg:translate-x-0'}`}>
            <div className="h-full flex flex-col">
                <div className="p-4 bg-green-700 flex items-center gap-3">
                    <img src="./assets/images/kypnlogo.jpeg" alt="KYPN" className="w-10 h-10 rounded-full object-contain border-2 border-white"/><div>
                        <p className="font-black text-white text-sm leading-tight">KYPN</p>
                        <p className="text-green-200 text-xs">Admin Portal</p>
                    </div>
                </div>
                <nav className="flex-1 p-3 space-y-1">
                    {[
                        { id: 'dashboard', icon: '🏠', label: 'Dashboard' },
                        { id: 'voters', icon: '👥', label: 'Members' },
                        { id: 'users', icon: '🔑', label: 'Users' },
                    ].map(item => (
                        <button key={item.id} onClick={() => setCurrentView(item.id)} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl text-left font-semibold transition ${currentView === item.id ? 'bg-green-600 text-white shadow-lg' : 'text-gray-700 hover:bg-green-50'}`}>
                            <span>{item.icon}</span>{item.label}
                        </button>
                    ))}
                </nav>
                <div className="p-4 border-t border-green-100">
                    <div className="bg-green-50 rounded-xl p-3 mb-3">
                        <p className="font-bold text-green-800 text-sm">Admin User</p>
                        <p className="text-xs text-green-600">{userRole}</p>
                    </div>
                    <button onClick={() => { setCurrentView('login'); setUserRole(null); showNotif('Logged out successfully'); }} className="w-full bg-red-600 text-white py-2 rounded-lg font-bold hover:bg-red-700 text-sm">Logout</button>
                </div>
            </div>
        </div>
    );

    // Route render
    if (currentView === 'login') return <><LoginView/><Notification/></>;
    if (currentView === 'self_register') return <><SelfRegisterView/><Notification/></>;

    return (
        <div className="flex h-screen overflow-hidden bg-gray-50">
            <Sidebar/>
            {sidebarOpen && <div className="fixed inset-0 bg-black bg-opacity-50 lg:hidden z-30" onClick={() => setSidebarOpen(false)}/>}
            <div className="flex-1 flex flex-col overflow-hidden">
                <header className="bg-green-700 px-6 py-3 flex items-center justify-between shadow-lg">
                    <div className="flex items-center gap-3">
                        <button onClick={() => setSidebarOpen(!sidebarOpen)} className="lg:hidden text-white">☰</button>
                        <div>
                            <h2 className="font-black text-white">
                                {currentView === 'dashboard' && 'Dashboard'}
                                {currentView === 'voters' && 'Member Management'}
                                {currentView === 'users' && 'User Management'}
                            </h2>
                            <p className="text-green-200 text-xs">Kano Youth Political Network — KYPN</p>
                        </div>
                    </div>
                    <div className="flex items-center gap-3">
                        <span className="text-white text-xs hidden md:block">📅 {new Date().toLocaleDateString('en-NG')}</span>
                        <div className="w-8 h-8 bg-white rounded-full flex items-center justify-center font-black text-green-700">A</div>
                    </div>
                </header>
                <main className="flex-1 overflow-y-auto p-5">
                    {currentView === 'dashboard' && <DashboardView/>}
                    {currentView === 'voters' && <VotersView/>}
                    {currentView === 'users' && <UsersView/>}
                </main>
            </div>
            <Notification/>
        </div>
    );
}

ReactDOM.render(<App/>, document.getElementById('root'));
</script>
</body>
</html>
